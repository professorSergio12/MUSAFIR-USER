# Production compose for EC2: uses pre-built images from Docker Hub.
# Set DOCKERHUB_USERNAME in env (your Docker Hub username).
# Run: DOCKERHUB_USERNAME=<your-username> docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/musafir-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME}/musafir-backend:latest
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    restart: unless-stopped

  worker:
    image: ${DOCKERHUB_USERNAME}/musafir-worker:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped